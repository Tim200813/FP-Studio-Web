<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontaktformular</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        /* Allgemeine Stile */
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 2rem;
            text-align: center;
            margin-bottom: 20px;
            color: #fff;
            font-weight: 600;
        }

        /* Formularstile */
        form {
            display: flex;
            flex-direction: column;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            font-size: 1rem;
            transition: background 0.3s, box-shadow 0.3s;
        }

        input::placeholder, textarea::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        input:focus, textarea:focus {
            background: rgba(255, 255, 255, 0.3);
            outline: none;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        textarea {
            resize: vertical;
            min-height: 120px;
            max-height: 200px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #1eff0a;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s, transform 0.3s;
        }

        button:hover {
            background: #7dff04;
            transform: translateY(-2px);
        }

        /* Social Links */
        .social-links {
            text-align: center;
            margin-top: 20px;
        }

        .social-links h3 {
            margin-bottom: 15px;
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.8);
        }

        .social-links a {
            margin: 0 10px;
            color: #fff;
            text-decoration: none;
            font-size: 1.5rem;
            transition: color 0.3s, transform 0.3s;
        }

        .social-links a:hover {
            color: #ff6f61;
            transform: translateY(-2px);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            color: #fff;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            animation: slideIn 0.3s ease-in-out;
            position: relative;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal-content i {
            font-size: 3rem;
            color: #4caf50; /* Grünes Häkchen */
            margin-bottom: 15px;
        }

        .modal-content p {
            font-size: 1.2rem;
            margin: 0;
        }

        .close {
            position: absolute;
            top: 15px;
            right: 20px;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            transition: color 0.3s;
        }

        .close:hover {
            color: #ff6f61;
        }

        /* Responsive Design */
        @media (max-width: 600px) {
            .container {
                padding: 20px;
                width: 95%;
            }

            h1 {
                font-size: 1.8rem;
            }

            input, textarea, button {
                font-size: 0.9rem;
            }

            .social-links a {
                font-size: 1.2rem;
            }

            .modal-content {
                padding: 20px;
            }

            .modal-content i {
                font-size: 2.5rem;
            }

            .modal-content p {
                font-size: 1rem;
            }
        }



        .back-button {
            text-decoration: none;
            color: #fff;
            font-size: 1.2rem;
            transition: color 0.3s, transform 0.3s;
            background-color: aqua;
        }

        .back-button:hover {
            color: #ffffff;
            transform: translateY(-2px);
            background-color: rgb(255, 51, 0);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Kontaktformular</h1>
        <form id="contactForm" action="senden.php" method="post">
            <input type="text" name="name" placeholder="Ihr Name" required>
            <input type="email" name="email" placeholder="Ihre E-Mail" required>
            <input type="text" name="subject" placeholder="Betreff" required>
            <textarea name="message" placeholder="Ihre Nachricht" required></textarea>
            <button type="submit">Absenden</button>
        </form>
        <div class="social-links">
            <h3>Zurück zum Hauptmenu:</h3>
            <!--<h3>Folge mir auf:</h3>
            <a href="https://www.instagram.com/yourusername" target="_blank">Instagram</a>
            <a href="https://www.youtube.com/c/yourchannel" target="_blank">YouTube</a>
            <a href="https://twitter.com/yourusername" target="_blank">Twitter</a>-->
            <button class="back-button" onclick="window.location.href='index.php'">Zurück</button>
        </div>
    </div>

    <!-- Modal -->
    <div id="successModal" class="modal">
        <div class="modal-content">
            <span class="close" id="closeModal">&times;</span>
            <i class="fas fa-check-circle"></i>
            <p>Nachricht erfolgreich gesendet!</p>
        </div>
    </div>


    <script>
        // Modal-Handling
        const modal = document.getElementById("successModal");
        const closeModal = document.getElementById("closeModal");
        const form = document.getElementById("contactForm");

        form.onsubmit = function (event) {
            event.preventDefault(); // Verhindert das normale Absenden des Formulars
            const formData = new FormData(form);

            fetch('senden.php', {
                method: 'POST',
                body: formData
            })
            .then(response => response.text())
            .then(data => {
                if (data.includes("✅ Nachricht erfolgreich gesendet!")) {
                    modal.style.display = "flex"; // Modal öffnen
                }
            });
        }

        closeModal.onclick = function () {
            modal.style.display = "none"; // Modal schließen
        }

        window.onclick = function (event) {
            if (event.target == modal) {
                modal.style.display = "none"; // Modal schließen
            }
        }
    </script>
</body>
</html>
